version: 0.2

phases:
  install:
    runtime-versions:
      docker: 20
    commands:
      - echo Installing kubectl
      - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      - chmod +x kubectl
      - mv kubectl /usr/local/bin/
  pre_build:
    commands:
      - echo Logging in to Amazon ECR
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin <account-id>.dkr.ecr.<region>.amazonaws.com
  build:
    commands:
      - echo Build Docker image
      - docker build -t my-app .
      - docker tag my-app:latest <account-id>.dkr.ecr.<region>.amazonaws.com/my-app:latest
      - docker push <account-id>.dkr.ecr.<region>.amazonaws.com/my-app:latest
  post_build:
    commands:
      - echo Build completed
artifacts:
  files:
    - '**/*'
